<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주디 커미션 중개소</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { max-width: 420px; margin: 0 auto; background-color: #f3f4f6; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; p: 4; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col font-sans">

    <!-- 헤더 -->
    <header class="bg-pink-100 p-4 sticky top-0 z-50 flex justify-between items-center border-b border-pink-200">
        <h1 class="text-xl font-bold text-pink-600 tracking-wider">🎀 주디 커미션</h1>
        <button id="loginBtn" class="bg-pink-500 text-white px-3 py-1.5 rounded-full text-sm font-semibold hover:bg-pink-600 transition">로그인/가입</button>
    </header>

    <!-- 메인 목록 -->
    <main class="flex-1 p-4 pb-20">
        <div class="mb-6 space-y-3">
            <input type="text" id="searchInput" placeholder="닉네임 또는 타입 이름 검색..." class="w-full p-3 rounded-2xl bg-white border border-gray-200 text-sm shadow-sm focus:outline-none">
        </div>
        <div id="commissionList" class="grid grid-cols-1 gap-4"></div>
    </main>

    <!-- 하단 탭 -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[420px] mx-auto bg-white border-t border-gray-100 p-2 flex justify-around items-center z-50">
        <button class="flex flex-col items-center text-pink-500 font-semibold text-xs" onclick="fetchCommissions()">🏠<span class="mt-0.5">홈</span></button>
        <button class="flex flex-col items-center text-gray-400 text-xs" onclick="openModal('regModal')">➕<span class="mt-0.5">등록</span></button>
    </nav>

    <!-- 🔐 1. 로그인/회원가입 모달 -->
    <div id="authModal" class="modal p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 relative">
            <button onclick="closeModal('authModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900">주디 커미션 시작하기</h2>
            <form id="authForm" onsubmit="handleAuth(e)">
                <div class="space-y-3 text-sm">
                    <input type="email" id="authEmail" placeholder="이메일 주소" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <input type="password" id="authPassword" placeholder="비밀번호" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <div id="authUsernameContainer" class="hidden space-y-3">
                        <input type="text" id="authUsername" placeholder="주디 인게임 닉네임" class="w-full p-3 rounded-xl border border-gray-200">
                        <select id="authRole" class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                            <option value="both">둘 다 해요 (커미션주 + 신청자)</option>
                            <option value="commissioner">커미션주만 신청</option>
                            <option value="applicant">신청자만 사용</option>
                        </select>
                    </div>
                    <button type="submit" id="authSubmitBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">로그인하기</button>
                </div>
            </form>
            <p id="authToggleText" onclick="toggleAuthMode()" class="text-center text-xs text-gray-400 underline cursor-pointer">처음이신가요? 인게임 닉네임으로 가입하기</p>
        </div>
    </div>

    <!-- ✍️ 2. 커미션 등록 모달 -->
    <div id="regModal" class="modal p-4">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 max-h-[85vh] overflow-y-auto relative">
            <button onclick="closeModal('regModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900">내 커미션 등록</h2>
            <form id="regForm" onsubmit="handleCreateCommission(event)">
                <div class="space-y-3 text-sm">
                    <input type="text" id="commTitle" placeholder="타입 이름 (예: 말랑 뽀짝 두상)" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="commPrice" placeholder="가격 (가치 단위)" class="w-1/2 p-3 rounded-xl border border-gray-200" required>
                        <select id="commSlot" class="w-1/2 p-3 rounded-xl border border-gray-200 bg-white">
                            <option value="always">상시 커미션</option>
                            <option value="1">슬롯 1개</option>
                            <option value="2">슬롯 2개</option>
                            <option value="3">슬롯 3개</option>
                            <option value="4">슬롯 4개</option>
                            <option value="5">슬롯 5개</option>
                        </select>
                    </div>
                    <div class="p-3 bg-gray-50 rounded-xl space-y-2">
                        <p class="text-xs font-semibold text-gray-500">타입 분류 태그</p>
                        <div class="flex flex-wrap gap-3">
                            <label><input type="checkbox" id="tagSD"> SD</label>
                            <label><input type="checkbox" id="tagLD"> LD</label>
                            <label><input type="checkbox" id="tagFix"> 고정틀</label>
                            <label><input type="checkbox" id="tagFree"> 자유</label>
                        </div>
                    </div>
                    <input type="text" id="commItem" placeholder="받는 아이템 (예: 블러썸 윙, 캐슬 크라운)" class="w-full p-3 rounded-xl border border-gray-200">
                    <input type="text" id="commCredit" placeholder="출처 표기 방식 (예: 닉네임 표기 필수)" class="w-full p-3 rounded-xl border border-gray-200">
                    <textarea id="commDesc" placeholder="타입에 대한 상세 설명을 적어주세요." rows="3" class="w-full p-3 rounded-xl border border-gray-200"></textarea>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">샘플 이미지 업로드</label>
                        <input type="file" id="commImage" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                    </div>
                    <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">등록 완료</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 📦 분리한 외부 자바스크립트 파일들 불러오기 -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="commission.js"></script>

    <script>
        // 공통 모달 제어 함수
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        // 앱 시작점
        document.addEventListener('DOMContentLoaded', () => {
            checkUser();
            fetchCommissions();
            
            // 폼 서브밋 이벤트 리스너 수동 바인딩
            document.getElementById('authForm').addEventListener('submit', (e) => handleAuth(e));
        });
    </script>
</body>
</html>
