<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주디 커미션 중개소</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { max-width: 420px; margin: 0 auto; background-color: #f3f4f6; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 16px; }
        .modal.active { display: flex; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col font-sans">

    <!-- 헤더 -->
    <header class="bg-pink-100 p-4 sticky top-0 z-50 flex justify-between items-center border-b border-pink-200">
        <h1 class="text-xl font-bold text-pink-600 tracking-wider cursor-pointer" onclick="location.reload()">🎀 주디 커미션</h1>
        <button id="loginBtn" class="bg-pink-500 text-white px-3 py-1.5 rounded-full text-sm font-semibold hover:bg-pink-600 transition">로그인/가입</button>
    </header>

    <!-- 메인 목록 -->
    <main class="flex-1 p-4 pb-20">
        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="타입 이름으로 검색..." class="w-full p-3 rounded-2xl bg-white border border-gray-200 text-sm shadow-sm focus:outline-none focus:border-pink-300">
        </div>

        <div class="flex gap-2 overflow-x-auto pb-3 scrollbar-none text-xs">
            <button onclick="changeFilter(this, '전체')" class="bg-pink-500 text-white px-3 py-1.5 rounded-full whitespace-nowrap font-medium shadow-sm transition">전체</button>
            <button onclick="changeFilter(this, 'SD')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">SD</button>
            <button onclick="changeFilter(this, 'LD')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">LD</button>
            <button onclick="changeFilter(this, '고정틀')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">고정틀</button>
            <button onclick="changeFilter(this, '반고정틀')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">반고정틀</button>
            <button onclick="changeFilter(this, '자유')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">자유</button>
            <button onclick="changeFilter(this, '풀채색')" class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300 transition">풀채색</button>
        </div>

        <div id="commissionList" class="grid grid-cols-1 gap-4"></div>
    </main>

    <!-- 하단 탭 바 (권한 검사 모달 연결) -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[420px] mx-auto bg-white border-t border-gray-100 p-2 flex justify-around items-center z-50">
        <button class="flex flex-col items-center text-pink-500 font-semibold text-xs" onclick="location.reload()">🏠<span class="mt-0.5">홈</span></button>
        <button class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400" onclick="openRegisterModal()">➕<span class="mt-0.5">등록</span></button>
    </nav>

    <!-- 🔐 1. 로그인/회원가입 모달 -->
    <div id="authModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 relative shadow-xl">
            <button onclick="closeModal('authModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900">주디 커미션 시작하기</h2>
            <form id="authForm">
                <div class="space-y-3 text-sm">
                    <input type="email" id="authEmail" placeholder="이메일 주소" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <input type="password" id="authPassword" placeholder="비밀번호" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <div id="authUsernameContainer" class="hidden space-y-3">
                        <input type="text" id="authUsername" placeholder="주디 인게임 닉네임" class="w-full p-3 rounded-xl border border-gray-200">
                        <input type="text" id="authContact" placeholder="기본 연락처 (예: 오픈채팅 링크 등)" class="w-full p-3 rounded-xl border border-gray-200">
                        <select id="authRole" class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                            <option value="commissioner">커미션주 (글 등록 가능)</option>
                            <option value="both">둘 다 해요 (글 등록 가능)</option>
                            <option value="applicant">신청자 전용 (글 조회/후기만 가능)</option>
                        </select>
                    </div>
                    <button type="submit" id="authSubmitBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">로그인하기</button>
                </div>
            </form>
            <p id="authToggleText" onclick="toggleAuthMode()" class="text-center text-xs text-gray-400 underline cursor-pointer">처음이신가요? 인게임 닉네임으로 가입하기</p>
        </div>
    </div>

    <!-- ✍️ 2. 커미션 등록 모달 -->
    <div id="regModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 max-h-[85vh] overflow-y-auto relative shadow-xl">
            <button onclick="closeModal('regModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900">내 커미션 등록</h2>
            <form id="regForm">
                <div class="space-y-3 text-sm">
                    <input type="text" id="commTitle" placeholder="타입 이름 (예: 말랑 뽀작 두상)" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="commPrice" placeholder="가격 (가치 단위)" class="w-1/2 p-3 rounded-xl border border-gray-200" required>
                        <select id="commSlot" class="w-1/2 p-3 rounded-xl border border-gray-200 bg-white">
                            <option value="always">상시 커미션</option>
                            <option value="1">슬롯 1개</option>
                            <option value="2">슬롯 2개</option>
                            <option value="3">슬롯 3개</option>
                            <option value="4">슬롯 4개</option>
                            <option value="5">슬롯 5개</option>
                        </select>
                    </div>
                    
                    <div class="p-3 bg-gray-50 rounded-xl space-y-2">
                        <p class="text-xs font-semibold text-gray-500">세부 분류 태그 선택</p>
                        <div class="grid grid-cols-3 gap-2 text-xs text-gray-600">
                            <label><input type="checkbox" id="tagSD" data-name="SD"> SD</label>
                            <label><input type="checkbox" id="tagLD" data-name="LD"> LD</label>
                            <label><input type="checkbox" id="tagFix" data-name="고정틀"> 고정틀</label>
                            <label><input type="checkbox" id="tagSemi" data-name="반고정틀"> 반고정틀</label>
                            <label><input type="checkbox" id="tagFree" data-name="자유"> 자유</label>
                            <label><input type="checkbox" id="tagDoodle" data-name="낙서"> 낙서</label>
                            <label><input type="checkbox" id="tagLine" data-name="선화"> 선화</label>
                            <label><input type="checkbox" id="tagColor" data-name="단색"> 단색</label>
                            <label><input type="checkbox" id="tagFull" data-name="풀채색"> 풀채색</label>
                            <label><input type="checkbox" id="tagHead" data-name="두상"> 두상</label>
                            <label><input type="checkbox" id="tagBust" data-name="흉상"> 흉상</label>
                            <label><input type="checkbox" id="tagHalf" data-name="반신"> 반신</label>
                            <label><input type="checkbox" id="tagBody" data-name="전신"> 전신</label>
                        </div>
                    </div>

                    <input type="text" id="commItem" placeholder="💎 받는 아이템 란 (상세 기재)" class="w-full p-3 rounded-xl border border-gray-200">
                    <input type="text" id="commCredit" placeholder="📌 출처 표기 방식 (한줄란)" class="w-full p-3 rounded-xl border border-gray-200">
                    
                    <!-- 🌟 3번 요구사항: 신청 연락망 기재란 추가 -->
                    <input type="text" id="commContact" placeholder="💬 신청 연락망 (예: 오픈채팅 링크 또는 인게임닉으로 연락)" class="w-full p-3 rounded-xl border border-pink-300 bg-pink-20/20 shadow-xs" required>
                    
                    <textarea id="commDesc" placeholder="타입에 대한 세부 설명 작성을 작성해주세요." rows="4" class="w-full p-3 rounded-xl border border-gray-200"></textarea>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">샘플 이미지 업로드</label>
                        <input type="file" id="commImage" accept="image/*" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100" required>
                    </div>
                    <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">등록 완료</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 🔍 3. 커미션 상세 페이지 모달 -->
    <div id="detailModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-5 space-y-4 max-h-[90vh] overflow-y-auto relative shadow-2xl">
            <button onclick="closeModal('detailModal')" class="absolute top-4 right-4 text-gray-400 text-xl z-10 bg-white/80 w-8 h-8 rounded-full flex items-center justify-center">✕</button>
            <div class="h-56 bg-gray-100 rounded-2xl overflow-hidden relative -mt-1 -mx-1">
                <img id="detailImg" src="" class="w-full h-full object-cover">
                <span id="detailPrice" class="absolute bottom-3 right-3 bg-pink-500 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md"></span>
            </div>
            <div class="border-b border-gray-100 pb-3">
                <div class="flex justify-between items-center text-xs text-gray-400 mb-1">
                    <span id="detailArtist"></span>
                    <span id="detailSlot" class="font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full"></span>
                </div>
                <h2 id="detailTitle" class="text-base font-bold text-gray-900"></h2>
            </div>
            <div class="space-y-2.5 text-xs">
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="font-bold text-blue-600 mb-0.5">💎 받는 아이템</p>
                    <p id="detailItem" class="text-gray-700 font-medium"></p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl">
                    <p class="font-bold text-amber-600 mb-0.5">📌 출처 표기 규칙</p>
                    <p id="detailCredit" class="text-gray-700"></p>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl">
                    <p class="font-bold text-gray-500 mb-1">📋 타입 상세 설명</p>
                    <p id="detailDesc" class="text-gray-600 whitespace-pre-wrap leading-relaxed"></p>
                </div>
            </div>
            <button id="detailContactBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold text-sm shadow-md hover:bg-pink-600 transition-colors"></button>
            <div class="border-t border-gray-100 pt-4 space-y-3">
                <h3 class="text-xs font-bold text-gray-800 flex items-center gap-1">💬 실사용 유저 후기</h3>
                <div id="reviewList" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                <form id="reviewForm" onsubmit="handleCreateReview(event)" class="pt-2 border-t border-dashed border-gray-100 space-y-2">
                    <input type="hidden" id="targetCommissionId">
                    <div class="flex gap-2 items-center">
                        <select id="reviewRating" class="p-2 rounded-lg border border-gray-200 text-xs bg-white">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                            <option value="2">⭐⭐</option>
                            <option value="1">⭐</option>
                        </select>
                        <input type="text" id="reviewContent" placeholder="짧은 후기를 남겨주세요!" class="flex-1 p-2 border border-gray-200 rounded-lg text-xs" required>
                        <button type="submit" class="bg-gray-800 text-white px-3 py-2 rounded-lg text-xs font-bold whitespace-nowrap">등록</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 스크립트 연결 -->
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="commission.js"></script>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        document.addEventListener('DOMContentLoaded', () => {
            checkUser();
            fetchCommissions();
            
            document.getElementById('authForm').addEventListener('submit', (e) => handleAuth(e));
            document.getElementById('regForm').addEventListener('submit', (e) => handleCreateCommission(e));
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value;
                fetchCommissions();
            });
        });
    </script>
</body>
</html>
