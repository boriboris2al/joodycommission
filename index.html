<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주디 커미션 중개소</title>
    <!-- Tailwind CSS (CDN 방식으로 터미널 설치 없이 바로 로드) -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Supabase JS 라이브러리 (CDN 로드) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 모바일 화면 규격 제한 (390x844 느낌으로 PC에서도 예쁘게 보이게 설정) */
        body {
            max-width: 420px;
            margin: 0 auto;
            background-color: #f3f4f6;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col font-sans">

    <!-- 상단 헤더 -->
    <header class="bg-pink-100 p-4 sticky top-0 z-50 flex justify-between items-center border-b border-pink-200">
        <h1 class="text-xl font-bold text-pink-600 tracking-wider">🎀 주디 커미션</h1>
        <button id="loginBtn" class="bg-pink-500 text-white px-3 py-1.5 rounded-full text-sm font-semibold hover:bg-pink-600 transition">
            로그인/가입
        </button>
    </header>

    <!-- 메인 컨텐츠 영역 -->
    <main class="flex-1 p-4 pb-20">
        <!-- 검색 및 필터 바 -->
        <div class="mb-6 space-y-3">
            <div class="relative">
                <input type="text" id="searchInput" placeholder="닉네임 또는 타입 이름 검색..." 
                       class="w-full p-3 pl-10 rounded-2xl bg-white border border-gray-200 shadow-sm focus:outline-none focus:border-pink-400 text-sm">
                <span class="absolute left-3.5 top-3.5 text-gray-400">🔍</span>
            </div>
            
            <!-- 필터 스크롤 바 (주디 감성 파스텔톤 태그) -->
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-none text-xs">
                <button class="bg-pink-500 text-white px-3 py-1.5 rounded-full whitespace-nowrap font-medium shadow-sm">전체</button>
                <button class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300">SD</button>
                <button class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300">LD</button>
                <button class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300">고정틀</button>
                <button class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300">자유</button>
                <button class="bg-white text-gray-600 border border-gray-200 px-3 py-1.5 rounded-full whitespace-nowrap hover:border-pink-300">풀채색</button>
            </div>
        </div>

        <!-- 커미션 카드 리스트 (DB 데이터가 여기 꽂힙니다) -->
        <div id="commissionList" class="grid grid-cols-1 gap-4">
            <!-- 로딩 상태 표시 -->
            <div class="text-center py-10 text-gray-400 text-sm">커미션 목록을 불러오는 중...</div>
        </div>
    </main>

    <!-- 하단 탭 바 (모바일 앱 느낌 내기) -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[420px] mx-auto bg-white border-t border-gray-100 p-2 flex justify-around items-center z-50">
        <button class="flex flex-col items-center text-pink-500 font-semibold text-xs">
            <span>🏠</span><span class="mt-0.5">홈</span>
        </button>
        <button id="addCommissionBtn" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400">
            <span>➕</span><span class="mt-0.5">등록</span>
        </button>
        <button id="myPageBtn" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400">
            <span>👤</span><span class="mt-0.5">마이페이지</span>
        </button>
    </nav>

    <!-- 💡 스크립트 영역: Supabase 연동 기능 -->
    <script>
        // 1. 본인의 Supabase 정보로 꼭 변경해주세요!
        const SUPABASE_URL = "https://YOUR_PROJECT_REF.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";
        
        // Supabase 클라이언트 초기화
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. 화면 열리자마자 커미션 목록 불러오기 실행
        document.addEventListener('DOMContentLoaded', () => {
            fetchCommissions();
        });

        // 3. 데이터베이스에서 커미션 목록 가져와서 화면에 뿌리는 함수
        async function fetchCommissions() {
            const listContainer = document.getElementById('commissionList');
            
            try {
                // commissions 테이블에서 프로필(인게임닉네임) 정보와 함께 최신순으로 가져오기
                const { data, error } = await supabase
                    .from('commissions')
                    .select(`
                        id, title, price, slot_type, tags, image_url,
                        profiles ( username )
                    `)
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (data.length === 0) {
                    listContainer.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm">등록된 커미션이 없습니다. 첫 주자가 되어보세요!</div>`;
                    return;
                }

                // 카드 HTML 동적 생성
                listContainer.innerHTML = data.map(item => {
                    const slotText = item.slot_type === 'always' ? '상시' : `슬롯 ${item.slot_type}/5`;
                    const tagsHTML = item.tags.map(tag => `<span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-[10px] font-medium">#${tag}</span>`).join(' ');
                    const sampleImg = item.image_url || 'https://via.placeholder.com/350x200?text=No+Image';

                    return `
                        <div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-md transition cursor-pointer" onclick="openDetail(${item.id})">
                            <div class="h-44 bg-gray-100 relative">
                                <img src="${sampleImg}" alt="${item.title}" class="w-full h-full object-cover">
                                <span class="absolute top-3 right-3 bg-black/60 text-white text-[11px] font-bold px-2.5 py-1 rounded-full backdrop-blur-xs">
                                    ${item.price} 가치
                                </span>
                            </div>
                            <div class="p-3.5 space-y-1.5">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-gray-400 font-medium">✨ ${item.profiles?.username || '알 수 없음'}</span>
                                    <span class="text-[11px] font-semibold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full">${slotText}</span>
                                </div>
                                <h3 class="font-bold text-gray-900 text-sm line-clamp-1">${item.title}</h3>
                                <div class="flex flex-wrap gap-1 pt-1">
                                    ${tagsHTML}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (error) {
                console.error(error);
                listContainer.innerHTML = `<div class="text-center py-10 text-red-400 text-sm">데이터를 불러오는데 실패했습니다. ㅠㅠ</div>`;
            }
        }

        function openDetail(id) {
            alert('상세 페이지 모달창은 다음 턴에 구현 예정입니다! 선택한 ID: ' + id);
        }
    </script>
</body>
</html>
