<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>주디 커미션</title>
    
    <!-- 🔤 KoPubWorld 돋움체 웹 폰트 로드 -->
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2212@1.0/KoPubWorldDotum.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            font-family: 'KoPubWorldDotum', sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }
        
        html, body {
            max-width: 420px;
            margin: 0 auto;
            background-color: #f3f4f6;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            overflow-x: hidden;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 30000 !important; 
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        .modal.active { display: flex; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        
        .snap-x {
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .snap-center {
            scroll-snap-align: center;
        }

        .dropdown-container-box {
            position: relative;
            z-index: 9999 !important;
        }

        .floating-dropdown-panel {
            position: absolute;
            top: 100%;
            margin-top: 4px;
            background-color: #ffffff;
            border: 1px solid #fbcfe8;
            padding: 4px;
            border-radius: 12px;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.12);
            z-index: 10000 !important;
            display: flex;
            flex-direction: column !important;
            gap: 4px;
            min-w: max-content !important;
        }
        
        #dropdown-구도 .floating-dropdown-panel,
        #dropdown-기타 .floating-dropdown-panel {
            left: auto;
            right: 0;
        }

        .floating-dropdown-panel.hidden {
            display: none !important;
        }

        .floating-dropdown-panel button {
            width: 100% !important;
            text-align: center !important;
            display: block !important;
            padding: 5px 12px !important;
            font-size: 11px !important;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col font-sans">

    <!-- 헤더 -->
    <header class="bg-pink-100 p-4 sticky top-0 z-50 flex justify-between items-center border-b border-pink-200">
        <h1 class="text-xl font-bold text-pink-600 tracking-wider cursor-pointer" onclick="location.reload()">🎀 주디 커미션</h1>
        <button id="loginBtn" class="bg-pink-500 text-white px-3 py-1.5 rounded-full text-sm font-semibold hover:bg-pink-600 transition">로그인/가입</button>
    </header>

    <!-- 🏠 홈 화면 컨텐츠 섹션 -->
    <div id="sectionHome" class="flex-1 flex flex-col">
        <main class="flex-1 p-4 pb-20 overflow-x-hidden">
            <!-- 검색바 -->
            <div id="searchBar" class="mb-4">
                <input type="text" id="searchInput" placeholder="타입 이름 또는 작가 이름 검색..." class="w-full p-3 rounded-2xl bg-white border border-gray-200 text-sm shadow-sm focus:outline-none focus:border-pink-300">
            </div>
            
            <!-- 🗂️ 5대 카테고리 드롭다운 바 구역 -->
            <div class="mb-5 space-y-2 dropdown-container-box">
                <div class="flex gap-2 items-center">
                    <button onclick="changeFilter(this, '전체')" class="bg-pink-500 text-white px-3 py-1.5 rounded-full whitespace-nowrap font-medium shadow-sm transition text-xs">전체보기 🔄</button>
                    <span class="text-xs text-gray-400 font-bold px-1">| 카테고리 선택:</span>
                </div>
                
                <div class="flex flex-wrap gap-1.5 pt-1">
                    <div id="dropdown-화풍" class="relative inline-block text-left">
                        <button onclick="toggleDropdown('화풍')" class="bg-white text-gray-700 border border-gray-200 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1 shadow-2xs">
                            <span class="btn-text">🎨 SD/LD</span> <span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                        </button>
                        <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                    </div>
                    
                    <div id="dropdown-틀 종류" class="relative inline-block text-left">
                        <button onclick="toggleDropdown('틀 종류')" class="bg-white text-gray-700 border border-gray-200 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1 shadow-2xs">
                            <span class="btn-text">🖼️ 고정틀/자유</span> <span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                        </button>
                        <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                    </div>

                    <div id="dropdown-채색" class="relative inline-block text-left">
                        <button onclick="toggleDropdown('채색')" class="bg-white text-gray-700 border border-gray-200 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1 shadow-2xs">
                            <span class="btn-text">✨ 채색</span> <span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                        </button>
                        <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                    </div>

                    <div id="dropdown-구도" class="relative inline-block text-left">
                        <button onclick="toggleDropdown('구도')" class="bg-white text-gray-700 border border-gray-200 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1 shadow-2xs">
                            <span class="btn-text">👤 구도</span> <span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                        </button>
                        <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                    </div>

                    <div id="dropdown-기타" class="relative inline-block text-left">
                        <button onclick="toggleDropdown('기타')" class="bg-white text-gray-700 border border-gray-200 px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center gap-1 shadow-2xs">
                            <span class="btn-text">🎁 기타</span> <span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                        </button>
                        <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                    </div>
                </div>
            </div>

            <!-- 1행 1타입 전용 피드 리스트 -->
            <div id="commissionList" class="flex flex-col gap-5 relative" style="z-index: 10;"></div>
        </main>
    </div>

    <!-- 🔖 북마크 화면 컨텐츠 섹션 -->
    <div id="sectionBookmark" class="flex-1 flex flex-col hidden">
        <main class="flex-1 p-4 pb-20 overflow-x-hidden">
            <h2 class="text-base font-bold text-gray-900 mb-4 flex items-center gap-1">🔖 내가 찜한 커미션</h2>
            <div id="bookmarkList" class="flex flex-col gap-5"></div>
        </main>
    </div>

    <!-- 하단 고정 탭 바 -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-[420px] mx-auto bg-white border-t border-gray-100 p-2 flex justify-around items-center z-50">
        <button id="tabHome" class="flex flex-col items-center text-pink-500 font-semibold text-xs" onclick="switchTab('home')">🏠<span class="mt-0.5">홈</span></button>
        <button id="registerTabBtn" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400">➕<span class="mt-0.5">등록</span></button>
        <button id="tabBookmark" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400" onclick="switchTab('bookmark')">🔖<span class="mt-0.5">북마크</span></button>
    </nav>

    <!-- 1. 로그인/회원가입 모달 -->
    <div id="authModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 relative shadow-xl">
            <button onclick="closeModal('authModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 id="authModalTitle" class="text-lg font-bold text-gray-900">로그인</h2>
            <form id="authForm">
                <div class="space-y-3 text-sm">
                    <input type="text" id="authUsername" placeholder="주디 인게임 닉네임" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <input type="password" id="authPassword" placeholder="비밀번호" class="w-full p-3 rounded-xl border border-gray-200" required>
                    <div id="authExtraContainer" class="hidden space-y-3">
                        <input type="text" id="authContact" placeholder="기본 연락처 (예: 오픈채팅 링크 등)" class="w-full p-3 rounded-xl border border-gray-200">
                        <select id="authRole" class="w-full p-3 rounded-xl border border-gray-200 bg-white">
                            <option value="commissioner">커미션주 (글 등록 가능)</option>
                            <option value="both">둘 다 해요 (글 등록 가능)</option>
                            <option value="applicant">신청자 전용 (글 조회/후기만 가능)</option>
                        </select>
                    </div>
                    <button type="submit" id="authSubmitBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">로그인하기</button>
                </div>
            </form>
            <p id="authToggleText" onclick="toggleAuthMode()" class="text-center text-xs text-gray-400 underline cursor-pointer">처음이신가요? 회원가입</p>
        </div>
    </div>

    <!-- 2. 커미션 등록/수정 통합 모달 -->
    <div id="regModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 max-h-[85vh] overflow-y-auto overflow-x-hidden relative shadow-xl">
            <button onclick="closeModal('regModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 id="regModalTitle" class="text-lg font-bold text-gray-900">내 커미션 등록</h2>
            <form id="regForm">
                <input type="hidden" id="editCommissionId">
                <div class="space-y-3 text-sm">
                    <input type="text" id="commTitle" placeholder="타입 이름 (예: 말랑 뽀작 두상)" class="w-full p-3 rounded-xl border border-gray-200" required>
                    
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="commPrice" placeholder="가격 (가치 단위)" class="w-1/2 p-3 rounded-xl border border-gray-200" required>
                        <select id="commSlotType" class="w-1/2 p-3 rounded-xl border border-gray-200 bg-white" onchange="toggleSlotInputDisplay(this.value)">
                            <option value="always">상시 커미션</option>
                            <option value="limited">슬롯 제한제</option>
                        </select>
                    </div>

                    <div id="customSlotInputGroup" class="hidden flex gap-2 p-3 bg-pink-50/40 rounded-xl border border-pink-100">
                        <div class="w-1/2">
                            <label class="text-[11px] font-bold text-gray-500 block mb-1">현재 찬 슬롯</label>
                            <select id="commCurrentSlots" class="w-full p-2.5 rounded-xl border border-gray-200 bg-white">
                                <option value="0">0개</option><option value="1">1개</option><option value="2">2개</option><option value="3">3개</option><option value="4">4개</option><option value="5">5개</option><option value="6">6개</option><option value="7">7개</option><option value="8">8개</option><option value="9">9개</option><option value="10">10개</option>
                            </select>
                        </div>
                        <div class="w-1/2">
                            <label class="text-[11px] font-bold text-gray-500 block mb-1">최대 슬롯 수</label>
                            <select id="commMaxSlots" class="w-full p-2.5 rounded-xl border border-gray-200 bg-white">
                                <option value="1">1개</option><option value="2">2개</option><option value="3">3개</option><option value="4">4개</option><option value="5" selected>5개</option><option value="6">6개</option><option value="7">7개</option><option value="8">8개</option><option value="9">9개</option><option value="10">10개</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-3 bg-gray-50 rounded-xl space-y-2">
                        <p class="text-xs font-semibold text-gray-500">세부 분류 태그 선택 (중복가능)</p>
                        <div class="grid grid-cols-3 gap-2 text-xs text-gray-600">
                            <label><input type="checkbox" id="tagSD" data-name="SD"> SD</label>
                            <label><input type="checkbox" id="tagLD" data-name="LD"> LD</label>
                            <label><input type="checkbox" id="tagFix" data-name="고정틀"> 고정틀</label>
                            <label><input type="checkbox" id="tagSemi" data-name="반고정틀"> 반고정틀</label>
                            <label><input type="checkbox" id="tagFree" data-name="자유"> 자유</label>
                            <label><input type="checkbox" id="tagDoodle" data-name="낙서"> 낙서</label>
                            <label><input type="checkbox" id="tagLine" data-name="선화"> 선화</label>
                            <label><input type="checkbox" id="tagColor" data-name="단색"> 단색</label>
                            <label><input type="checkbox" id="tagFull" data-name="풀채색"> 풀채색</label>
                            <label><input type="checkbox" id="tagHead" data-name="두상"> 두상</label>
                            <label><input type="checkbox" id="tagBust" data-name="흉상"> 흉상</label>
                            <label><input type="checkbox" id="tagHalf" data-name="반신"> 반신</label>
                            <label><input type="checkbox" id="tagBody" data-name="전신"> 전신</label>
                            <label><input type="checkbox" id="tagCaddie" data-name="캐디"> 캐디</label>
                            <label><input type="checkbox" id="tagEtc" data-name="기타"> 기타</label>
                        </div>
                    </div>
                    
                    <input type="text" id="commItem" placeholder="💎 받는 아이템 (상세 기재)" class="w-full p-3 rounded-xl border border-gray-200">
                    <input type="text" id="commCredit" placeholder="📌 출처 표기 방식" class="w-full p-3 rounded-xl border border-gray-200">
                    <input type="text" id="commContact" placeholder="💬 신청 연락망 (예: 오픈채팅 링크 등)" class="w-full p-3 rounded-xl border border-pink-300" required>
                    <textarea id="commDesc" placeholder="타입에 대한 세부 설명을 작성해주세요." rows="4" class="w-full p-3 rounded-xl border border-gray-200"></textarea>
                    
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">샘플 이미지 업로드 (최대 4-6장)</label>
                        <input type="file" id="commImage" accept="image/*" multiple class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100">
                        <p id="editImgNotice" class="text-[10px] text-amber-500 mt-1 hidden">⚠️ 수정 모드: 새 사진을 올리면 기존 샘플들이 덮어씌워집니다.</p>
                    </div>
                    <button type="submit" id="regSubmitBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">등록 완료</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 🔍 3. 커미션 상세 모달 -->
    <div id="detailModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-5 space-y-4 max-h-[85vh] overflow-y-auto overflow-x-hidden relative shadow-2xl">
            <div class="absolute top-4 left-4 right-4 flex justify-between items-center z-20">
                <div class="flex gap-1.5">
                    <button id="detailDeleteBtn" class="bg-red-50 text-red-600 px-2.5 py-1 rounded-full text-[11px] font-bold border border-red-200 hover:bg-red-100 hidden">🔴 삭제</button>
                    <button id="detailEditBtn" class="bg-blue-50 text-blue-600 px-2.5 py-1 rounded-full text-[11px] font-bold border border-blue-200 hover:bg-blue-100 hidden">✏️ 수정</button>
                </div>
                <button id="detailBookmarkBtn" class="bg-amber-50 text-amber-600 px-2.5 py-1 rounded-full text-[11px] font-bold border border-amber-200 hover:bg-amber-100">🤍 북마크</button>
                <button onclick="closeModal('detailModal')" class="bg-white/90 text-gray-500 w-8 h-8 rounded-full flex items-center justify-center shadow-md font-bold text-lg">✕</button>
            </div>
            
            <div class="relative -mt-1 -mx-1 rounded-2xl overflow-hidden">
                <div id="detailSliderContainer" class="h-56 bg-gray-100 flex overflow-x-auto snap-x snap-mandatory scrollbar-none"></div>
                <span id="detailPrice" class="absolute bottom-3 right-3 bg-pink-500 text-white text-xs font-bold px-3 py-1.5 rounded-full shadow-md z-20"></span>
                <span id="detailImgCounter" class="absolute bottom-3 left-3 bg-black/50 text-white text-[10px] font-medium px-2 py-0.5 rounded-full z-20 hidden"></span>
            </div>

            <div class="border-b border-gray-100 pb-3">
                <div class="flex justify-between items-center text-xs text-gray-400 mb-1">
                    <!-- 🌟 작가 이름 클릭 시 고유 프로필로 라우팅되도록 스타일링 튜닝 -->
                    <span id="detailArtist" class="cursor-pointer font-bold text-pink-600 hover:underline"></span>
                    <span id="detailSlot" class="font-bold text-pink-500 bg-pink-50 px-2 py-0.5 rounded-full"></span>
                </div>
                <h2 id="detailTitle" class="text-base font-bold text-gray-900"></h2>
            </div>
            <div class="space-y-2.5 text-xs">
                <div class="bg-blue-50 p-3 rounded-xl">
                    <p class="font-bold text-blue-600 mb-0.5">💎 받는 아이템</p>
                    <p id="detailItem" class="text-gray-700 font-medium"></p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl">
                    <p class="font-bold text-amber-600 mb-0.5">📌 출처 표기 규칙</p>
                    <p id="detailCredit" class="text-gray-700"></p>
                </div>
                <div class="bg-gray-50 p-3 rounded-xl">
                    <p class="font-bold text-gray-500 mb-1">📋 타입 상세 설명</p>
                    <p id="detailDesc" class="text-gray-600 whitespace-pre-wrap leading-relaxed"></p>
                </div>
            </div>
            <button id="detailContactBtn" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold text-sm shadow-md hover:bg-pink-600"></button>
            
            <div class="border-t border-gray-100 pt-4 space-y-3">
                <h3 class="text-xs font-bold text-gray-800">💬 신청 후기</h3>
                <div id="reviewList" class="space-y-2 max-h-40 overflow-y-auto pr-1"></div>
                
                <form id="reviewForm" class="pt-2 border-t border-dashed border-gray-100 flex flex-col gap-2">
                    <input type="hidden" id="targetCommissionId">
                    <select id="reviewRating" class="w-full p-2.5 rounded-xl border border-gray-200 text-xs bg-white">
                        <option value="5">⭐⭐⭐⭐⭐ (5점)</option>
                        <option value="4">⭐⭐⭐⭐ (4점)</option>
                        <option value="3">⭐⭐⭐ (3점)</option>
                        <option value="2">⭐⭐ (2점)</option>
                        <option value="1">⭐ (1점)</option>
                    </select>
                    <div class="flex gap-1.5 w-full">
                        <input type="text" id="reviewContent" placeholder="짧은 후기를 남겨주세요!" class="flex-1 p-2.5 border border-gray-200 rounded-xl text-xs focus:outline-none" required>
                        <button type="submit" class="bg-gray-800 text-white px-4 rounded-xl text-xs font-bold whitespace-nowrap shadow-sm">등록</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 👤 2. [신규 추가] 타인 및 작가 프로필 상세 보기 모달 포맷 구역 -->
    <div id="artistProfileModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 max-h-[85vh] overflow-y-auto overflow-x-hidden relative shadow-xl space-y-4">
            <button onclick="closeModal('artistProfileModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <div class="text-center border-b border-gray-100 pb-3 space-y-1">
                <h2 id="artistNameTitle" class="text-lg font-bold text-gray-900">🎨 작가 프로필</h2>
                <p id="artistRoleBadge" class="text-[10px] bg-pink-50 text-pink-500 inline-block px-2.5 py-0.5 rounded-full font-bold"></p>
            </div>
            
            <div class="space-y-2 text-xs">
                <div class="bg-gray-50 p-3 rounded-xl space-y-1">
                    <p class="font-bold text-gray-500">💬 소통 연락처</p>
                    <p id="artistContactInfo" class="text-gray-700 font-medium break-all select-all"></p>
                </div>
                <div class="bg-purple-50 p-3 rounded-xl space-y-1">
                    <p class="font-bold text-purple-600">⏰ 응답 가능 시간</p>
                    <p id="artistResponseTime" class="text-gray-700 font-medium"></p>
                </div>
            </div>

            <div class="space-y-2 pt-2">
                <h3 class="text-xs font-bold text-gray-800 flex items-center gap-1">🖼️ 이 작가의 다른 타입들</h3>
                <div id="artistCommissionsList" class="flex flex-col gap-4"></div>
            </div>
        </div>
    </div>

    <!-- 4. 프로필 메뉴 모달 -->
    <div id="profileMenuModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative shadow-xl">
            <button onclick="closeModal('profileMenuModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900 mb-4">내 계정</h2>
            <div class="space-y-2">
                <button id="menuMyTypes" onclick="openMyTypes()" class="w-full text-left bg-pink-50 hover:bg-pink-100 text-pink-700 font-semibold p-3.5 rounded-xl text-sm transition">🖼️ 내 커미션 관리 (수정/비공개/마감/삭제)</button>
                <button onclick="openEditProfile()" class="w-full text-left bg-gray-50 hover:bg-gray-100 text-gray-700 font-semibold p-3.5 rounded-xl text-sm transition">✏️ 정보 수정</button>
                <button onclick="closeModal('profileMenuModal'); if(confirm('로그아웃 하시겠습니까?')) handleLogout();" class="w-full text-left bg-gray-50 hover:bg-gray-100 text-gray-500 font-semibold p-3.5 rounded-xl text-sm transition">🚪 로그아웃</button>
            </div>
        </div>
    </div>

    <!-- 5. 내 타입 보기 모달 -->
    <div id="myTypesModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 max-h-[85vh] overflow-y-auto overflow-x-hidden relative shadow-xl">
            <button onclick="closeModal('myTypesModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900 mb-4">내 커미션 관리</h2>
            <div id="myTypesList" class="space-y-2"></div>
        </div>
    </div>

    <!-- 6. 정보 수정 모달 (🌟 응답 시간 설정 칸 내장 보강) -->
    <div id="editProfileModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 relative shadow-xl">
            <button onclick="closeModal('editProfileModal')" class="absolute top-4 right-4 text-gray-400 text-xl">✕</button>
            <h2 class="text-lg font-bold text-gray-900 mb-4">정보 수정</h2>
            <form id="editProfileForm">
                <div class="space-y-3 text-sm">
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">인게임 닉네임</label>
                        <input type="text" id="editUsername" class="w-full p-3 rounded-xl border border-gray-200" required>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">연락망</label>
                        <input type="text" id="editContact" placeholder="오픈채팅 링크 또는 닉네임" class="w-full p-3 rounded-xl border border-gray-200">
                    </div>
                    <!-- 🌟 응답 시간 설정 신규 인풋 -->
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">⏰ 응답 가능 시간</label>
                        <input type="text" id="editResponseTime" placeholder="예: 평일 18시~23시 / 주말 상시 대기" class="w-full p-3 rounded-xl border border-gray-200">
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-gray-500 block mb-1">새 비밀번호 (변경 시에만 입력)</label>
                        <input type="password" id="editPassword" placeholder="변경하지 않으면 비워두세요" class="w-full p-3 rounded-xl border border-gray-200">
                    </div>
                    <button type="submit" class="w-full bg-pink-500 text-white p-3 rounded-xl font-bold mt-2">저장하기</button>
                </div>
            </form>
        </div>
    </div>

    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="commission.js"></script>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function toggleSlotInputDisplay(val) {
            const group = document.getElementById('customSlotInputGroup');
            if (val === 'limited') { group.classList.remove('hidden'); } 
            else { group.classList.add('hidden'); }
        }

        window.addEventListener('click', function(e) {
            const categories = ['화풍', '틀 종류', '채색', '구도', '기타'];
            categories.forEach(cat => {
                const wrapper = document.getElementById(`dropdown-${cat}`);
                if (!wrapper) return;
                if (!wrapper.contains(e.target)) {
                    const panel = wrapper.querySelector('.dropdown-panel');
                    const arrow = wrapper.querySelector('.dropdown-arrow');
                    if(panel) panel.classList.add('hidden');
                    if(arrow) arrow.style.transform = 'rotate(0deg)';
                }
            });
        });

        function switchTab(tab) {
            const secHome = document.getElementById('sectionHome');
            const secBookmark = document.getElementById('sectionBookmark');
            const btnHome = document.getElementById('tabHome');
            const btnBookmark = document.getElementById('tabBookmark');

            if (tab === 'home') {
                if (secHome) secHome.classList.remove('hidden');
                if (secBookmark) secBookmark.classList.add('hidden');
                if (btnHome) btnHome.className = "flex flex-col items-center text-pink-500 font-semibold text-xs";
                if (btnBookmark) btnBookmark.className = "flex flex-col items-center text-gray-400 text-xs hover:text-pink-400";
                if (typeof fetchCommissions === 'function') fetchCommissions();
            } else if (tab === 'bookmark') {
                if (secHome) secHome.classList.add('hidden');
                if (secBookmark) secBookmark.classList.remove('hidden');
                if (btnHome) btnHome.className = "flex flex-col items-center text-gray-400 text-xs hover:text-pink-400";
                if (btnBookmark) btnBookmark.className = "flex flex-col items-center text-pink-500 font-semibold text-xs";
                if (typeof fetchBookmarks === 'function') fetchBookmarks();
            }
        }

        function updateDropdownButtonsUI() {
            const categories = [
                { label: '화풍', defaultName: 'SD/LD', icon: '🎨', tags: ['SD', 'LD'] },
                { label: '틀 종류', defaultName: '고정틀/자유', icon: '🖼️', tags: ['고정틀', '반고정틀', '자유'] },
                { label: '채색', defaultName: '채색', icon: '✨', tags: ['낙서', '선화', '단색', 'full채색', '풀채색'] },
                { label: '구도', defaultName: '구도', icon: '👤', tags: ['두상', '흉상', '반신', '전신'] },
                { label: '기타', defaultName: '기타', icon: '🎁', tags: ['캐디', '기타'] },
            ];

            categories.forEach(cat => {
                const wrapper = document.getElementById(`dropdown-${cat.label}`);
                if (!wrapper) return;
                const btnTextEl = wrapper.querySelector('.btn-text');
                if (!btnTextEl) return;

                const selectedInCat = cat.tags.filter(t => window.currentActiveTags && window.currentActiveTags.includes(t));

                if (selectedInCat.length > 0) {
                    btnTextEl.innerText = `${cat.icon} ${selectedInCat.join(', ')}`;
                    btnTextEl.parentElement.classList.add('border-pink-400', 'bg-pink-50/50');
                } else {
                    btnTextEl.innerText = `${cat.icon} ${cat.defaultName}`;
                    btnTextEl.parentElement.classList.remove('border-pink-400', 'bg-pink-50/50');
                }
            });
        }

        window.addEventListener('load', () => {
            if (!window.currentActiveTags) window.currentActiveTags = [];

            if (typeof checkUser === 'function') checkUser();
            if (typeof renderTagDropdowns === 'function') renderTagDropdowns();
            if (typeof fetchCommissions === 'function') fetchCommissions();

            const originToggleTagFilter = window.toggleTagFilter;
            if (typeof originToggleTagFilter === 'function') {
                window.toggleTagFilter = function(tag) {
                    originToggleTagFilter(tag);
                    updateDropdownButtonsUI();
                };
            }
            const originChangeFilter = window.changeFilter;
            if (typeof originChangeFilter === 'function') {
                window.changeFilter = function(target, filterName) {
                    originChangeFilter(target, filterName);
                    updateDropdownButtonsUI();
                };
            }

            const regBtn = document.getElementById('registerTabBtn');
            if (regBtn) {
                regBtn.addEventListener('click', () => {
                    document.getElementById('editCommissionId').value = "";
                    document.getElementById('regForm').reset();
                    document.getElementById('commSlotType').value = "always";
                    toggleSlotInputDisplay("always");
                    document.getElementById('regModalTitle').innerText = "내 커미션 등록";
                    document.getElementById('regSubmitBtn').innerText = "등록 완료";
                    document.getElementById('editImgNotice').classList.add('hidden');
                    openRegisterModal();
                });
            }

            const authForm = document.getElementById('authForm');
            if (authForm) {
                authForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (typeof handleAuth === 'function') handleAuth(e);
                });
            }

            const regForm = document.getElementById('regForm');
            if (regForm) {
                regForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (typeof handleCreateCommission === 'function') handleCreateCommission(e);
                });
            }

            const reviewForm = document.getElementById('reviewForm');
            if (reviewForm) {
                reviewForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    if (typeof handleCreateReview === 'function') handleCreateReview(e);
                });
            }

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    currentSearch = e.target.value;
                    if (typeof fetchCommissions === 'function') fetchCommissions();
                });
            }
        });
    </script>
</body>
</html>
