<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Joody Commission ⭐️ PurinLand Style</title>
    
    <!-- 🔤 KoPubWorld 로드 -->
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2212@1.0/KoPubWorldDotum.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* 폰트 정의 추가 및 변경 */
        @font-face {
            font-family: 'Cafe24ProSlim';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2511-1@1.0/Cafe24PROSlim-Light.woff2') format('woff2');
            font-weight: 300;
            font-display: swap;
        }

        @font-face {
            font-family: 'Cafe24ProSlim';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2511-1@1.0/Cafe24PROSlim-Regular.woff2') format('woff2');
            font-weight: 400;
            font-display: swap;
        }

        @font-face {
            font-family: 'Cafe24ProSlim';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2511-1@1.0/Cafe24PROSlim-Bold.woff2') format('woff2');
            font-weight: 700;
            font-display: swap;
        }

        /* [형님 픽] RoundedFixedsys 고전 도트 폰트 정의 */
        @font-face {
            font-family: 'RoundedFixedsys';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        /* 기본적으로 메인 레이아웃 및 제어부에는 고전 도트 스타일 매핑 */
        * {
            font-family: 'RoundedFixedsys', 'KoPubWorldDotum', sans-serif !important;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            box-sizing: border-box;
        }

        /* 🌟 [요구사항 1]: 본문 내부 설명용 글씨들은 무조건 가독성이 탁월한 KoPubWorld 폰트로 강제 복구 치료 */
        .kopub-readable, .kopub-readable *, #detailItem, #detailDeadline, #detailCredit, #detailOk, #detailNg, #detailDesc, #reviewList p, #reviewList span, input[type="text"], textarea {
            font-family: 'KoPubWorldDotum', sans-serif !important;
            font-weight: 500 !important;
        }
        
        /* 전체 배경: 흰색 바탕에 분홍색 도트(점) 패턴 (넓은 간격) */
        body {
            background-color: #ffffff;
            background-image: radial-gradient(#fbcfe8 2px, transparent 2px);
            background-size: 32px 32px;
            min-height: 100vh;
        }

        /* 앱 전용 종횡 고정 컨테이너 */
        .phone-container {
            max-width: 420px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            border-left: 4px double #fbcfe8;
            border-right: 4px double #fbcfe8;
            box-shadow: 0 0 30px rgba(219, 39, 119, 0.1);
            position: relative;
        }
        
        /* 🌟 타이틀 헤더 구역 배경: 점 크기를 줄이고(4px -> 2.5px) 간격을 더 촘촘하게(28px -> 18px) 수정 */
        .y2k-header-grid {
            background-color: #d8fbf9;
            background-image: radial-gradient(rgba(255, 140, 200, 0.7) 2.5px, transparent 2.5px);
            background-size: 18px 18px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 30000 !important;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
        }
        .modal.active { display: flex; }
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .snap-x { scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .snap-center { scroll-snap-align: center; }
        .dropdown-container-box { position: relative; z-index: 9999 !important; }
        
        .floating-dropdown-panel {
            position: absolute;
            top: 100%;
            margin-top: 4px;
            background-color: #ffffff;
            border: 2px dashed #fbcfe8;
            padding: 6px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(219,39,119,0.08);
            z-index: 10000 !important;
            display: flex;
            flex-direction: column !important;
            gap: 4px;
            min-width: max-content !important;
        }
        #dropdown-구도 .floating-dropdown-panel,
        #dropdown-기타 .floating-dropdown-panel { left: auto; right: 0; }
        .floating-dropdown-panel.hidden { display: none !important; }
        
        /* 오리지널 입체 그라데이션 알약 UI 컴포넌트 */
        .y2k-nametag {
            background: linear-gradient(to bottom, #fbcfe8 0%, #f472b6 100%) !important;
            border: 1px solid #db2777 !important;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.15);
            box-shadow: inset 0 1px 2px rgba(255,255,255,0.7), 0 2px 4px rgba(0,0,0,0.06);
            color: #ffffff !important;
        }
        .y2k-nametag:hover {
            opacity: 0.95;
        }

        /* 메인 상단 타이틀 로고용 스티커 필터 - 요청 서체 적용 및 볼드 처리 */
        .y2k-main-title {
            font-family: 'Cafe24ProSlim', sans-serif !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            text-shadow: 
                -2px -2px 0 #c3fa7f,  
                 2px -2px 0 #c3fa7f,
                -2px  2px 0 #c3fa7f,
                 2px  2px 0 #c3fa7f,
                -2px  0px 0 #c3fa7f,
                 2px  0px 0 #c3fa7f,
                 0px -2px 0 #c3fa7f,
                 0px  2px 0 #c3fa7f,
                 2px  2px 4px rgba(0,0,0,0.15);
            letter-spacing: -0.5px;
        }

        /* 🌟 [요구사항 2]: 두 번째 사진 스타일의 얇은 대시선 테두리 + 은은한 그라데이션 4색 배지 명세 */
        .btn-y2k-pink {
            background: linear-gradient(to bottom, #fff5f5 0%, #ffe3e3 100%);
            border: 2px dashed #fca5a5;
            color: #dc2626 !important;
        }
        .btn-y2k-blue {
            background: linear-gradient(to bottom, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px dashed #bae6fd;
            color: #2563eb !important;
        }
        .btn-y2k-green {
            background: linear-gradient(to bottom, #f0fdf4 0%, #dcfce7 100%);
            border: 2px dashed #bbf7d0;
            color: #16a34a !important;
        }
        .btn-y2k-purple {
            background: linear-gradient(to bottom, #faf5ff 0%, #f3e8ff 100%);
            border: 2px dashed #e9d5ff;
            color: #9333ea !important;
        }

        .sort-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .sort-bar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="phone-container flex flex-col">
        <!-- 헤더 바 -->
        <header class="y2k-header-grid p-4 sticky top-0 z-50 flex justify-between items-center border-b-4 border-double border-pink-300">
            <h1 class="text-xl font-bold y2k-main-title cursor-pointer transition-transform duration-100 active:scale-95" onclick="location.reload()">Joody Commission</h1>
            <button id="loginBtn" class="y2k-nametag px-3 py-1.5 rounded-full text-xs font-bold transition-all">로그인/가입</button>
        </header>

        <!-- 🏠 홈 화면 컨텐츠 섹션 -->
        <div id="sectionHome" class="flex-1 flex flex-col">
            <main class="flex-1 p-4 pb-20 overflow-x-hidden">
                <!-- 검색창 -->
                <div id="searchBar" class="mb-4">
                    <input type="text" id="searchInput" placeholder="타입 이름 또는 작가 이름 검색..." class="w-full p-3 rounded-xl bg-white border-2 border-dashed border-pink-200 text-sm shadow-2xs focus:outline-none focus:border-pink-400">
                </div>
                
                <!-- 카테고리 + 정렬 필터 -->
                <div class="mb-5 space-y-2 dropdown-container-box">
                    <div class="flex gap-2 items-center">
                        <button onclick="changeFilter(this, '전체')" class="y2k-nametag text-white px-3 py-1.5 rounded-full whitespace-nowrap font-medium text-xs">전체보기 🔄</button>
                        <span class="text-xs text-gray-400 font-bold px-1">| 분류메뉴</span>
                    </div>
                    
                    <div class="flex flex-wrap gap-1.5 pt-1">
                        <div id="dropdown-화풍" class="relative inline-block text-left">
                            <button onclick="toggleDropdown('화풍')" class="y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs">
                                <span class="btn-text">🎨 SD/LD</span><span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                            </button>
                            <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                        </div>
                        <div id="dropdown-틀 종류" class="relative inline-block text-left">
                            <button onclick="toggleDropdown('틀 종류')" class="y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs">
                                <span class="btn-text">🖼️ 고정/자유</span><span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                            </button>
                            <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                        </div>
                        <div id="dropdown-채색" class="relative inline-block text-left">
                            <button onclick="toggleDropdown('채색')" class="y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs">
                                <span class="btn-text">✨ 채색</span><span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                            </button>
                            <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                        </div>
                        <div id="dropdown-구도" class="relative inline-block text-left">
                            <button onclick="toggleDropdown('구도')" class="y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs">
                                <span class="btn-text">👤 구도</span><span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                            </button>
                            <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                        </div>
                        <div id="dropdown-기타" class="relative inline-block text-left">
                            <button onclick="toggleDropdown('기타')" class="y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs">
                                <span class="btn-text">🎁 기타</span><span class="dropdown-arrow transition-transform duration-200 text-[9px]">▼</span>
                            </button>
                            <div class="dropdown-panel floating-dropdown-panel hidden"></div>
                        </div>
                    </div>

                    <!-- 정렬 버튼 바 -->
                    <div class="sort-bar flex gap-1.5 pt-1 pb-0.5">
                        <button id="sort-random" onclick="changeSortMode('random')" class="sort-btn y2k-nametag px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-xs">🎲 랜덤</button>
                        <button id="sort-latest" onclick="changeSortMode('latest')" class="sort-btn bg-white text-gray-600 border-2 border-pink-100 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">🆕 최신순</button>
                        <button id="sort-reviews" onclick="changeSortMode('reviews')" class="sort-btn bg-white text-gray-600 border-2 border-pink-100 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">💬 후기순</button>
                        <button id="sort-bookmarks" onclick="changeSortMode('bookmarks')" class="sort-btn bg-white text-gray-600 border-2 border-pink-100 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">🔖 북마크순</button>
                        <button id="sort-popular" onclick="changeSortMode('popular')" class="sort-btn bg-white text-gray-600 border-2 border-pink-100 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap">🔥 인기순</button>
                    </div>
                </div>

                <div id="commissionList" class="flex flex-col gap-5 relative" style="z-index: 10;"></div>
            </main>
        </div>

        <!-- 🔖 북마크 화면 컨텐츠 섹션 -->
        <div id="sectionBookmark" class="flex-1 flex flex-col hidden">
            <main class="flex-1 p-4 pb-20 overflow-x-hidden">
                <h2 class="text-base font-bold text-gray-900 mb-4 flex items-center gap-1">🔖 북마크</h2>
                <div id="bookmarkList" class="flex flex-col gap-5"></div>
            </main>
        </div>

        <!-- 하단 고정 탭 바 -->
        <nav class="absolute bottom-0 left-0 right-0 bg-white border-t-4 border-double border-pink-200 p-2 flex justify-around items-center z-50">
            <button id="tabHome" class="flex flex-col items-center text-pink-500 font-bold text-xs" onclick="switchTab('home')">🏠<span class="mt-0.5">홈</span></button>
            <button id="registerTabBtn" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400">➕<span class="mt-0.5">등록</span></button>
            <button id="tabBookmark" class="flex flex-col items-center text-gray-400 text-xs hover:text-pink-400" onclick="switchTab('bookmark')">🔖<span class="mt-0.5">북마크</span></button>
        </nav>
    </div>

    <!-- ===== 로그인/가입 모달 ===== -->
    <div id="authModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 relative border-4 border-double border-pink-300 shadow-2xl">
            <button onclick="closeModal('authModal')" class="absolute top-4 right-4 text-gray-400 text-xl font-bold">✕</button>
            <h2 id="authModalTitle" class="text-lg font-bold text-pink-600 border-b-2 border-dashed border-pink-200 pb-1">로그인 ☆</h2>
            <form id="authForm">
                <div class="space-y-3 text-sm">
                    <input type="text" id="authUsername" placeholder="주디 인게임 닉네임" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none focus:border-pink-400" required>
                    <div class="relative">
                        <input type="password" id="authPassword" placeholder="비밀번호" class="w-full p-3 pr-12 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none focus:border-pink-400" required>
                        <button type="button" onclick="togglePasswordVisibility('authPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-lg select-none">🐵</button>
                    </div>
                    <div id="authExtraContainer" class="hidden space-y-3">
                        <input type="text" id="authContact" placeholder="기본 연락처 (예: 오픈채팅 링크 등)" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none focus:border-pink-400">
                        <select id="authRole" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 bg-white text-xs">
                            <option value="commissioner">커미션주 (글 등록 가능)</option>
                            <option value="both">둘 다 해요 (글 등록 가능)</option>
                            <option value="applicant">신청자 전용 (글 조회/후기만 가능)</option>
                        </select>
                    </div>
                    <button type="submit" id="authSubmitBtn" class="w-full y2k-nametag text-white p-3 rounded-xl font-bold mt-2">로그인하기</button>
                </div>
            </form>
            <p id="authToggleText" onclick="toggleAuthMode()" class="text-center text-xs text-gray-400 underline cursor-pointer">처음이신가요? 회원가입</p>
        </div>
    </div>

    <!-- ===== 커미션 등록/수정 모달 ===== -->
    <div id="regModal" class="modal">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 max-h-[85vh] overflow-y-auto overflow-x-hidden relative border-4 border-double border-pink-300 shadow-2xl">
            <button onclick="closeModal('regModal')" class="absolute top-4 right-4 text-gray-400 text-xl font-bold">✕</button>
            <h2 id="regModalTitle" class="text-lg font-bold text-pink-600 border-b-2 border-dashed border-pink-200 pb-1">내 커미션 등록 ☆</h2>
            <form id="regForm">
                <input type="hidden" id="editCommissionId">
                <div class="space-y-3 text-sm">
                    <input type="text" id="commTitle" placeholder="타입 이름 (예: 말랑 뽀작 두상)" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none focus:border-pink-400" required>
                    
                    <div class="flex gap-2">
                        <input type="number" step="0.1" id="commPrice" placeholder="가격 (가치 단위)" class="w-1/2 p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none focus:border-pink-400" required>
                        <select id="commSlotType" class="w-1/2 p-3 rounded-xl border-2 border-dashed border-pink-100 bg-white text-xs focus:outline-none">
                            <option value="always">상시 커미션</option>
                            <option value="limited">슬롯 제한제</option>
                        </select>
                    </div>

                    <div id="customSlotInputGroup" class="hidden flex gap-2 p-3 bg-pink-50/40 rounded-xl border-2 border-dashed border-pink-200">
                        <div class="w-1/2">
                            <label class="text-[11px] font-bold text-pink-500 block mb-1">현재 찬 슬롯</label>
                            <select id="commCurrentSlots" class="w-full p-2.5 rounded-xl border border-gray-200 bg-white text-xs">
                                <option value="0">0개</option><option value="1">1개</option><option value="2">2개</option><option value="3">3개</option><option value="4">4개</option><option value="5">5개</option><option value="6">6개</option><option value="7">7개</option><option value="8">8개</option><option value="9">9개</option><option value="10">10개</option>
                            </select>
                        </div>
                        <div class="w-1/2">
                            <label class="text-[11px] font-bold text-pink-500 block mb-1">최대 슬롯 수</label>
                            <select id="commMaxSlots" class="w-full p-2.5 rounded-xl border border-gray-200 bg-white text-xs">
                                <option value="1">1개</option><option value="2">2개</option><option value="3">3개</option><option value="4">4개</option><option value="5" selected>5개</option><option value="6">6개</option><option value="7">7개</option><option value="8">8개</option><option value="9">9개</option><option value="10">10개</option>
                            </select>
                        </div>
                    </div>

                    <div class="p-3 bg-pink-50/30 rounded-xl border-2 border-dashed border-pink-100 space-y-2">
                        <p class="text-xs font-bold text-pink-600">세부 분류 태그 선택 (중복가능)</p>
                        <div class="grid grid-cols-3 gap-2 text-[11px] text-gray-600">
                            <label class="cursor-pointer"><input type="checkbox" data-name="SD"> SD</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="LD"> LD</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="고정틀"> 고정틀</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="반고정틀"> 반고정틀</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="자유"> 자유</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="낙서"> 낙서</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="선화"> 선화</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="단색"> 단색</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="풀채색"> 풀채색</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="두상"> 두상</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="흉상"> 흉상</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="반신"> 반신</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="전신"> 전신</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="캐디"> 캐디</label>
                            <label class="cursor-pointer"><input type="checkbox" data-name="기타"> 기타</label>
                        </div>
                    </div>
                    
                    <input type="text" id="commItem" placeholder="💎 받는 아이템 (상세 기재)" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none" >
                    <input type="text" id="commCredit" placeholder="📌 출처 표기 방식" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none" >
                    <input type="text" id="commDeadline" placeholder="📅 작업 마감기한 (예: 최대 2주 / 5일 이내)" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none" >
                    <input type="text" id="commContact" placeholder="💬 신청 연락망 (예: 오픈채팅 링크 등)" class="w-full p-3 rounded-xl border-2 border-pink-300 focus:outline-none" required>
                    <textarea id="commDesc" placeholder="타입에 대한 세부 설명을 작성해주세요." rows="3" class="w-full p-3 rounded-xl border-2 border-dashed border-pink-100 focus:outline-none" ></textarea>

                    <div class="p-3 bg-green-50/60 rounded-xl border-2 border-dashed border-green-200 space-y-1">
                        <p class="text-xs font-bold text-green-700">✅ OK (가능한 것)</p>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }

        function toggleSlotInputDisplay(val) {
            const group = document.getElementById('customSlotInputGroup');
            if (val === 'limited') group.classList.remove('hidden');
            else group.classList.add('hidden');
        }

        window.addEventListener('click', function(e) {
            ['화풍', '틀 종류', '채색', '구도', '기타'].forEach(cat => {
                const wrapper = document.getElementById(`dropdown-${cat}`);
                if (!wrapper) return;
                if (!wrapper.contains(e.target)) {
                    const panel = wrapper.querySelector('.dropdown-panel');
                    const arrow = wrapper.querySelector('.dropdown-arrow');
                    if (panel) panel.classList.add('hidden');
                    if (arrow) arrow.style.transform = 'rotate(0deg)';
                }
            });
        });

        function switchTab(tab) {
            const secHome = document.getElementById('sectionHome');
            const secBookmark = document.getElementById('sectionBookmark');
            const btnHome = document.getElementById('tabHome');
            const btnBookmark = document.getElementById('tabBookmark');
            if (tab === 'home') {
                secHome.classList.remove('hidden'); secBookmark.classList.add('hidden');
                btnHome.className = "flex flex-col items-center text-pink-500 font-bold text-xs";
                btnBookmark.className = "flex flex-col items-center text-gray-400 text-xs hover:text-pink-400";
                if (typeof fetchCommissions === 'function') fetchCommissions();
            } else if (tab === 'bookmark') {
                secHome.classList.add('hidden'); secBookmark.classList.remove('hidden');
                btnHome.className = "flex flex-col items-center text-gray-400 text-xs hover:text-pink-400";
                btnBookmark.className = "flex flex-col items-center text-pink-500 font-bold text-xs";
                if (typeof fetchBookmarks === 'function') fetchBookmarks();
            }
        }

        function updateDropdownButtonsUI() {
            const categories = [
                { label: '화풍', defaultName: 'SD/LD', icon: '🎨', tags: ['SD', 'LD'] },
                { label: '틀 종류', defaultName: '고정틀/자유', icon: '🖼️', tags: ['고정틀', '반고정틀', '자유'] },
                { label: '채색', defaultName: '채색', icon: '✨', tags: ['낙서', '선화', '단색', '풀채색'] },
                { label: '구도', defaultName: '구도', icon: '👤', tags: ['두상', '흉상', '반신', '전신'] },
                { label: '기타', defaultName: '기타', icon: '🎁', tags: ['캐디', '기타'] },
            ];
            categories.forEach(cat => {
                const wrapper = document.getElementById(`dropdown-${cat.label}`);
                if (!wrapper) return;
                const btnTextEl = wrapper.querySelector('.btn-text');
                if (!btnTextEl) return;
                const selectedInCat = cat.tags.filter(t => window.currentActiveTags && window.currentActiveTags.includes(t));
                if (selectedInCat.length > 0) {
                    btnTextEl.parentElement.className = "y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs";
                } else {
                    btnTextEl.parentElement.className = "y2k-nametag px-2.5 py-1.5 rounded-full text-xs font-semibold flex items-center gap-1 shadow-3xs";
                }
            });
        }

        const originChangeSortMode = window.changeSortMode;
        if (typeof originChangeSortMode === 'function') {
            window.changeSortMode = function(mode) {
                window.currentSortMode = mode;
                document.querySelectorAll('.sort-btn').forEach(b => {
                    b.className = "sort-btn bg-white text-gray-600 border-2 border-pink-100 px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap";
                });
                const activeBtn = document.getElementById(`sort-${mode}`);
                if (activeBtn) {
                    activeBtn.className = "sort-btn y2k-nametag px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap shadow-xs";
                }
                if (typeof fetchCommissions === 'function') fetchCommissions();
            };
        }

        function handleSharedLink() {
            const params = new URLSearchParams(location.search);
            const commissionId = params.get('commission');
            const artistId = params.get('artist');
            if (commissionId) {
                setTimeout(() => { if (typeof openDetailModal === 'function') openDetailModal(parseInt(commissionId)); }, 800);
            } else if (artistId) {
                setTimeout(() => { if (typeof openArtistProfile === 'function') openArtistProfile(artistId); }, 800);
            }
        }

        window.addEventListener('load', () => {
            if (!window.currentActiveTags) window.currentActiveTags = [];
            if (!window.currentSortMode) window.currentSortMode = 'random';

            if (typeof checkUser === 'function') checkUser();
            if (typeof renderTagDropdowns === 'function') renderTagDropdowns();
            if (typeof fetchCommissions === 'function') fetchCommissions();

            handleSharedLink();

            const originToggleTagFilter = window.toggleTagFilter;
            if (typeof originToggleTagFilter === 'function') {
                window.toggleTagFilter = function(tag) {
                    originToggleTagFilter(tag); updateDropdownButtonsUI();
                };
            }
            const originChangeFilter = window.changeFilter;
            if (typeof originChangeFilter === 'function') {
                window.changeFilter = function(target, filterName) {
                    originChangeFilter(target, filterName); updateDropdownButtonsUI();
                };
            }

            const regBtn = document.getElementById('registerTabBtn');
            if (regBtn) {
                regBtn.addEventListener('click', () => {
                    document.getElementById('editCommissionId').value = "";
                    document.getElementById('regForm').reset();
                    document.getElementById('commSlotType').value = "always";
                    toggleSlotInputDisplay("always");
                    document.getElementById('regModalTitle').innerText = "내 커미션 등록";
                    document.getElementById('regSubmitBtn').innerText = "등록 완료";
                    document.getElementById('editImgNotice').classList.add('hidden');
                    if (typeof openRegisterModal === 'function') openRegisterModal();
                });
            }

            const authForm = document.getElementById('authForm');
            if (authForm) authForm.addEventListener('submit', e => { e.preventDefault(); if (typeof handleAuth === 'function') handleAuth(e); });

            const editProfileForm = document.getElementById('editProfileForm');
            if (editProfileForm) editProfileForm.addEventListener('submit', e => { e.preventDefault(); if (typeof handleEditProfile === 'function') handleEditProfile(e); });

            const regForm = document.getElementById('regForm');
            if (regForm) regForm.addEventListener('submit', e => { e.preventDefault(); if (typeof handleCreateCommission === 'function') handleCreateCommission(e); });

            const reviewForm = document.getElementById('reviewForm');
            if (reviewForm) reviewForm.addEventListener('submit', e => { e.preventDefault(); if (typeof handleCreateReview === 'function') handleCreateReview(e); });

            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', e => {
                    window.currentSearch = e.target.value;
                    if (typeof fetchCommissions === 'function') fetchCommissions();
                });
            }

            const reviewImageInput = document.getElementById('reviewImage');
            if (reviewImageInput) {
                reviewImageInput.addEventListener('change', () => {
                    const nameEl = document.getElementById('reviewImageName');
                    if (nameEl) nameEl.innerText = reviewImageInput.files[0]?.name || '';
                });
            }
        });
    </script>
</body>
</html>
